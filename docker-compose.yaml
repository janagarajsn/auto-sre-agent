services:
  agent:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      ENV: dev
      REDIS_URL: redis://redis:6379/0
      PROMETHEUS_URL: http://host.docker.internal:9091
      K8S_KUBECONFIG_PATH: /home/sre/.kube/config
      K8S_SERVER_OVERRIDE: https://host.docker.internal:53968
    depends_on:
      redis:
        condition: service_healthy
      prometheus:
        condition: service_started
    volumes:
      - ~/.kube:/home/sre/.kube:ro
    restart: unless-stopped
    networks:
      - sre

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - sre

  prometheus:
    image: prom/prometheus:v2.55.0
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/rules.yaml:/etc/prometheus/rules/rules.yaml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - sre

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - sre

networks:
  sre:
    driver: bridge

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
