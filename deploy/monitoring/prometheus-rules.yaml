apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: sre-agent-rules
  namespace: monitoring
  labels:
    release: prometheus  # must match the Helm release name used in bootstrap.sh
spec:
  groups:
  - name: kubernetes.pod_alerts
    interval: 30s
    rules:
      - alert: PodCrashLooping
        expr: max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}[5m]) >= 1
        for: 0m
        labels:
          severity: high
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted more than 3 times in 5 minutes."

      - alert: PodOOMKilled
        expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
        for: 0m
        labels:
          severity: high
        annotations:
          summary: "Pod {{ $labels.pod }} was OOMKilled"
          description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} was killed due to OOM."

      - alert: HighCpuUsage
        expr: rate(container_cpu_usage_seconds_total{container!=""}[5m]) * 100 > 90
        for: 5m
        labels:
          severity: medium
        annotations:
          summary: "High CPU on {{ $labels.pod }}"
          description: "Container {{ $labels.container }} CPU usage is above 90% for 5 minutes."

      - alert: HighMemoryUsage
        expr: |
          container_memory_working_set_bytes{container!=""}
          / container_spec_memory_limit_bytes{container!=""}
          * 100 > 85
        for: 5m
        labels:
          severity: medium
        annotations:
          summary: "High memory on {{ $labels.pod }}"
          description: "Container {{ $labels.container }} memory usage is above 85% of limit."

      - alert: DeploymentReplicasMismatch
        expr: kube_deployment_spec_replicas != kube_deployment_status_ready_replicas
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "Deployment {{ $labels.deployment }} replica mismatch"
          description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has fewer ready replicas than desired for 5 minutes."

  - name: application.latency_alerts
    interval: 60s
    rules:
      - alert: HighP99Latency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 2.0
        for: 5m
        labels:
          severity: medium
        annotations:
          summary: "High P99 latency on {{ $labels.service }}"
          description: "P99 latency is above 2s for service {{ $labels.service }}."

      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m])
          / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: high
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate above 5% for service {{ $labels.service }}."
